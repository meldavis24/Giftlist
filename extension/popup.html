<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>GiftList</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        width: 320px;
        padding: 12px;
        color: #111;
      }
      h1 {
        font-size: 15px;
        margin: 0 0 10px;
      }
      label {
        display: block;
        font-size: 12px;
        color: #555;
        margin: 8px 0 2px;
      }
      input,
      select {
        width: 100%;
        box-sizing: border-box;
        padding: 6px 8px;
        font-size: 13px;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      button {
        margin-top: 12px;
        width: 100%;
        padding: 8px;
        background: #111;
        color: #fff;
        border: none;
        border-radius: 4px;
        font-size: 13px;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.5;
        cursor: default;
      }
      #status {
        margin-top: 8px;
        font-size: 12px;
      }
      #setupNotice {
        font-size: 12px;
        color: #555;
      }
      #setupNotice a {
        color: #111;
      }
      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <h1>Add to GiftList</h1>

    <div id="setupNotice" class="hidden">
      Not configured yet. <a href="#" id="openOptions">Set up the extension</a>.
    </div>

    <form id="addForm" class="hidden">
      <label for="list">List</label>
      <select id="list" required></select>

      <label for="title">Item name</label>
      <input id="title" type="text" />

      <label for="url">Product URL</label>
      <input id="url" type="text" readonly />

      <button id="submit" type="submit">Add to list</button>
      <div id="status"></div>
    </form>

    <script src="popup.js"></script>
  </body>
</html>
